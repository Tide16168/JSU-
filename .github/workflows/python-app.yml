name: 챔쨋혚챈혱혺책쨘짠채쩍혥챕짖혙챌쨘짝

on:
  schedule:
    - cron: "55 11 * * *"
  workflow_dispatch:

jobs:
  reserve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 챔짰쩐챌쩍짰 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 책짰혟챔짙혚채쩐혶챔쨉혯
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 책혛혲책혚짜챕혚혥챌쩍짰챈혯혝채쨩쨋
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          echo "$CONFIG_JSON" > config.json
          echo "config.json 책쨌짼책혞혴책쨩쨘"

      - name: 챈혟짠챔징혣책쨘짠채쩍혥챕짖혙챌쨘짝
        run: python main.py -m action
